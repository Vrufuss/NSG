  .row { display: flex; align-items: baseline; justify-content: space-between; }
  #brand { font-size: 18px; letter-spacing: 3px; }
  #brand span { color: var(--accent); }
  #savestate, #epcount { font-size: 11px; color: var(--fade); }
  #epcount { font-size: 12px; margin-top: 2px; }
  #hero { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-top: 16px; flex-grow: 1; }
  #navrow { display: flex; align-items: center; gap: 12px; width: 100%; justify-content: center; }
  .navbtn {
    width: 56px; height: 72px; font-size: 30px; border-radius: 12px;
    background: rgba(245,239,228,0.06); color: var(--paper);
    border: 1px solid rgba(245,239,228,0.12);
    font-family: 'Bebas Neue', sans-serif;
  }
  .navbtn:disabled { color: #3A4050; }
  #epinput {
    font-family: 'Bebas Neue', sans-serif; font-size: 96px; line-height: 1;
    width: 200px; text-align: center; background: transparent; color: var(--paper);
    border: none; border-bottom: 2px solid var(--accent); caret-color: var(--accent);
  }
  #epinput::-webkit-outer-spin-button, #epinput::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  #epinput[type=number] { -moz-appearance: textfield; }
  #season { font-size: 13px; color: var(--fade); letter-spacing: 2px; padding-top: 8px; }
  #status { font-size: 64px; line-height: 1; letter-spacing: 4px; padding-top: 12px; transition: color 300ms ease; }
  #title { font-size: 17px; font-weight: 500; padding: 8px 16px 0; }
  #note { font-size: 13px; color: var(--fade); padding-top: 4px; }
  #jump {
    display: none; margin-top: 20px; font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px; padding: 12px 22px; border-radius: 12px;
    background: var(--accent); color: #1A0E00; border: none;
  }
  #canonnote { display: none; font-size: 12px; color: var(--fade); padding-top: 12px; }
  #canonnote b { color: var(--accent); font-weight: 600; }
  #nextbtn {
    width: 100%; margin-top: 32px; padding: 16px 0; font-size: 24px; letter-spacing: 3px;
    border-radius: 14px; background: rgba(245,239,228,0.08); color: var(--paper);
    border: 1px solid rgba(255,122,26,0.33); font-family: 'Bebas Neue', sans-serif;
  }
  #upnext-label { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 3px; color: var(--fade); padding-top: 28px; }
  #upnext { display: flex; flex-direction: column; gap: 4px; padding-top: 8px; }
  .uprow {
    display: flex; align-items: center; gap: 12px; text-align: left;
    padding: 9px 12px; border-radius: 10px; background: rgba(245,239,228,0.04);
    border: 1px solid rgba(245,239,228,0.07); color: var(--paper); width: 100%;
  }
  .updot { width: 8px; height: 8px; border-radius: 99px; flex-shrink: 0; }
  .upnum { font-size: 12px; color: var(--fade); width: 36px; flex-shrink: 0; }
  .uptitle { font-size: 13px; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upstatus { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1.5px; flex-shrink: 0; }
  footer { margin-top: auto; padding-top: 36px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--fade); }
  footer .legend { display: flex; gap: 12px; }
  #reset { color: var(--fade); text-decoration: underline; background: none; border: none; font-size: 11px; font-family: inherit; }
  button { cursor: pointer; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--paper); outline-offset: 2px; }

const STATUS = [
  { word: "CANON", color: "#FF7A1A", note: "Main story. Watch it." },
  { word: "WATCH", color: "#5BA8E5", note: "Filler, but worth your time." },
  { word: "SKIP",  color: "#6E7480", note: "Filler. Safe to skip." },
];
const KEY = "ns-progress";
const $ = (id) => document.getElementById(id);

let ep = 1;
try {
  const v = localStorage.getItem(KEY);
  if (v != null) ep = clamp(parseInt(v, 10) || 1);
} catch (e) {}

function clamp(n) { return Math.max(1, Math.min(500, n)); }
function nextWorthWatching(from) { for (let i = from; i < 500; i++) if (EPS[i][2] !== 2) return i + 1; return null; }
function nextCanon(from) { for (let i = from; i < 500; i++) if (EPS[i][2] === 0) return i + 1; return null; }

function save() {
  try { localStorage.setItem(KEY, String(ep)); $("savestate").textContent = "Place saved"; }
  catch (e) { $("savestate").textContent = "Saving not available here"; }
}

function go(n) { ep = clamp(n); save(); render(); }

function render() {
  const cur = EPS[ep - 1];
  const st = STATUS[cur[2]];
  document.body.style.background =
    "radial-gradient(ellipse 120% 60% at 50% -10%, " + st.color + "26, transparent 60%), #0B1020";

  $("epcount").textContent = "Episode " + ep + " of 500";
  $("epinput").value = ep;
  $("prev").disabled = ep <= 1;
  $("next").disabled = ep >= 500;
  $("nextbtn").disabled = ep >= 500;
  $("season").textContent = cur[0];
  $("status").textContent = st.word;
  $("status").style.color = st.color;
  $("epinput").style.borderBottomColor = st.color;
  $("epinput").style.caretColor = st.color;
  $("title").textContent = cur[1];
  $("note").textContent = st.note;

  const jumpTo = cur[2] === 2 ? nextWorthWatching(ep) : null;
  const canonAt = cur[2] !== 0 ? nextCanon(ep) : null;
  if (jumpTo) {
    $("jump").style.display = "block";
    $("jump").textContent = "JUMP TO #" + jumpTo + " \u2014 NEXT ONE WORTH WATCHING";
    $("jump").onclick = () => go(jumpTo);
    $("canonnote").style.display = "none";
  } else {
    $("jump").style.display = "none";
    if (canonAt) {
      $("canonnote").style.display = "block";
      $("canonnote").innerHTML = "Story picks back up at <b>#" + canonAt + "</b>";
    } else {
      $("canonnote").style.display = "none";
    }
  }

  const box = $("upnext");
  box.innerHTML = "";
  for (let n = ep + 1; n <= Math.min(ep + 5, 500); n++) {
    const e = EPS[n - 1];
    const s = STATUS[e[2]];
    const b = document.createElement("button");
    b.className = "uprow";
    b.onclick = () => go(n);
    b.innerHTML =
      '<span class="updot" style="background:' + s.color + '"></span>' +
      '<span class="upnum mono">#' + n + "</span>" +
      '<span class="uptitle"></span>' +
      '<span class="upstatus" style="color:' + s.color + '">' + s.word + "</span>";
    b.querySelector(".uptitle").textContent = e[1];
    box.appendChild(b);
  }
  $("upnext-label").style.display = ep >= 500 ? "none" : "block";
}

$("prev").onclick = () => go(ep - 1);
$("next").onclick = () => go(ep + 1);
$("nextbtn").onclick = () => go(ep + 1);
$("epinput").onblur = () => {
  const n = parseInt($("epinput").value, 10);
  if (!isNaN(n)) go(n); else $("epinput").value = ep;
};
$("epinput").onkeydown = (e) => { if (e.key === "Enter") e.target.blur(); };
$("reset").onclick = () => {
  try { localStorage.removeItem(KEY); } catch (e) {}
  go(1);
  $("savestate").textContent = "Progress reset";
};

render();
</script>
